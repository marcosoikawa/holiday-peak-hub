name: holiday-peak-hub
infra:
  provider: bicep
  path: .infra/azd
services:
  ui:
    project: apps/ui
    dist: .next
    language: js
    host: staticwebapp
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: yarn install --frozen-lockfile; yarn build
          interactive: false
        posix:
          shell: sh
          run: yarn install --frozen-lockfile && yarn build
          interactive: false
  crud-service:
    project: apps/crud-service/src
    dist: .
    language: python
    host: aks
    docker:
      path: ../Dockerfile
      context: ../../..
    k8s:
      namespace: holiday-peak
      deploymentPath: ../../../.kubernetes/rendered/crud-service
    hooks:
      predeploy:
        windows:
          shell: pwsh
          run: ../../../.infra/azd/hooks/render-helm.ps1 -ServiceName crud-service
          interactive: false
        posix:
          shell: sh
          run: ../../../.infra/azd/hooks/render-helm.sh crud-service
          interactive: false
  crm-campaign-intelligence:
