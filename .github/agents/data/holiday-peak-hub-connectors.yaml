# holiday-peak-hub — Enterprise Connector Implementation Context
# Consumed by: The Patchbay (enterprise-connectors.agent.md)
# Repository: holiday-peak-hub

project: holiday-peak-hub
domain: enterprise-connectors

connector_structure:
  root: lib/src/holiday_peak_lib/connectors/
  layout: |
    connectors/
    ├── common/
    │   ├── protocols.py          # Domain data models (ProductData, InventoryData, etc.)
    │   └── versioning.py         # Protocol version negotiation
    ├── registry.py               # ConnectorRegistry
    ├── inventory_scm/
    │   ├── sap_s4hana/
    │   │   ├── __init__.py
    │   │   ├── connector.py      # SAPS4HANAConnector(InventoryConnectorBase)
    │   │   ├── auth.py           # OAuth2 handler
    │   │   └── mappings.py       # OData → InventoryData mapping
    │   ├── oracle_scm/
    │   └── ...
    ├── pim/
    │   ├── salsify/
    │   ├── akeneo/
    │   └── ...
    ├── dam/
    │   ├── cloudinary/
    │   └── ...
    ├── crm_loyalty/
    │   ├── salesforce/
    │   └── ...
    ├── commerce_order/
    │   ├── shopify/
    │   └── ...
    ├── data_analytics/
    ├── integration/
    ├── workforce/
    └── identity/

base_classes:
  parent: BaseAdapter (from holiday_peak_lib.adapters.base)
  capabilities:
    - "Circuit breaker: automatic failure isolation"
    - "Retry logic: configurable retries with exponential backoff"
    - "Timeout management: per-request and global timeouts"
    - "Health checks: async health() -> HealthStatus"
    - "Metrics: request count, latency, error rate"
  domain_abcs:
    - PIMConnectorBase
    - DAMConnectorBase
    - CRMConnectorBase
    - InventoryConnectorBase
    - CommerceConnectorBase
    - AnalyticsConnectorBase
    - IntegrationConnectorBase
    - WorkforceConnectorBase
    - IdentityConnectorBase

protocol_data_models:
  - name: ProductData
    domain: PIM connectors
  - name: AssetData
    domain: DAM connectors
  - name: InventoryData
    domain: SCM/WMS connectors
  - name: CustomerData
    domain: CRM/CDP connectors
  - name: OrderData
    domain: Commerce/OMS connectors
  - name: SegmentData
    domain: Analytics connectors

authentication_patterns:
  - type: "OAuth 2.0"
    variants: ["Client Credentials", "JWT Bearer", "Authorization Code"]
  - type: "API Key"
    variants: ["Header-based", "Query parameter"]
  - type: "Basic Auth"
    note: "Username/password (rarely needed)"
  - type: "Azure AD"
    note: "DefaultAzureCredential for Microsoft services"
  - type: "Adobe IMS"
    note: "JWT-based service account auth"

implementation_rules:
  - "One connector = one package (e.g., connectors/pim/salsify/ with __init__.py, connector.py, auth.py, mappings.py)"
  - "Extend domain-specific ABC — never implement BaseAdapter directly"
  - "Map to canonical models — connectors MUST map vendor data to protocol models"
  - "Async-first — use httpx.AsyncClient for all HTTP calls"
  - "Token caching — cache OAuth tokens with TTL, auto-refresh"
  - "Pagination — support cursor/offset pagination for all list endpoints"
  - "Rate limiting — respect vendor rate limits, implement backoff"
  - "Error mapping — map vendor HTTP errors to domain exceptions"
  - "Config via env vars — {VENDOR}_BASE_URL, {VENDOR}_API_KEY, {VENDOR}_CLIENT_ID, etc."
  - "Follow PEP 8 strictly"
  - "Tests with mocked responses — use httpx mock transport or responses library"
  - "Never store credentials in code — reference Azure Key Vault"

testing:
  location: lib/tests/test_connectors/{domain}/{vendor}/
  required:
    - "Unit tests with mocked HTTP responses for all API endpoints"
    - "Auth tests (token acquisition, refresh, error handling)"
    - "Data mapping tests (vendor response → canonical model)"
    - "Pagination tests"
    - "Error handling tests (rate limit, auth failure, network error)"
    - "Health check tests"

branch_naming: "feature/<issue-number>-<short-description>"

