name: deploy-azd-prod (entrypoint)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  verify-release:
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GitHub Release exists for tag
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          status=$(curl -sS -o /tmp/release-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          if [ "$status" != "200" ]; then
            echo "Stable production tag '${{ github.ref_name }}' must have a published GitHub Release before deployment." >&2
            cat /tmp/release-check.json 2>/dev/null || true
            exit 1
          fi

          DRAFT=$(python3 -c "import json; print(str(json.load(open('/tmp/release-check.json')).get('draft', False)).lower())")
          PRERELEASE=$(python3 -c "import json; print(str(json.load(open('/tmp/release-check.json')).get('prerelease', False)).lower())")
          if [ "$DRAFT" = "true" ] || [ "$PRERELEASE" = "true" ]; then
            echo "Production release for '${{ github.ref_name }}' must be published and non-prerelease (draft=false, prerelease=false)." >&2
            exit 1
          fi

      - name: Verify tag commit is reachable from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Production tag '${{ github.ref_name }}' points to commit '$GITHUB_SHA' that is not reachable from main." >&2
            exit 1
          fi

  deploy:
    needs: verify-release
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/deploy-azd.yml
    with:
      environment: prod
      location: centralus
      projectName: holidaypeakhub405
      imageTag: ${{ github.ref_name }}
      deployStatic: true
      uiOnly: false
      apiBaseUrl: ''
      seedDemoData: false
      deployChangedOnly: true
      forceApimSync: true
      autoAllowAcrRunnerIp: false
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
