name: deploy-azd-dev (entrypoint)

on:
  workflow_run:
    workflows:
      - test
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      location:
        description: Azure location
        required: true
        default: centralus
      projectName:
        description: Project prefix used by naming convention
        required: true
        default: holidaypeakhub405
      imageTag:
        description: Image tag to deploy
        required: true
        default: latest
      testedSourceSha:
        description: Optional tested source commit SHA to deploy (empty = current ref)
        required: false
        default: ''
      testedSourceRef:
        description: Optional tested source ref to deploy (empty = current ref)
        required: false
        default: ''
      skipProvision:
        description: Skip azd provision and reuse the current dev infrastructure for a manual emergency redeploy
        required: true
        type: boolean
        default: false
      serviceFilter:
        description: Optional comma-separated AKS service names to deploy (empty = all changed services)
        required: false
        default: ''
      deployStatic:
        description: Provision static web app resources
        required: true
        type: boolean
        default: true
      uiOnly:
        description: Deploy only the UI using SWA token (skips provision and Azure login jobs)
        required: true
        type: boolean
        default: false
      apiBaseUrl:
        description: Optional API base URL for UI build override
        required: false
        default: ''
      forceApimSync:
        description: Force APIM sync and smoke checks even when no changed services are detected
        required: true
        type: boolean
        default: true
      autoAllowAcrRunnerIp:
        description: Temporarily allow GitHub runner egress IP in ACR firewall during deploy and remove it afterward
        required: true
        type: boolean
        default: true
      skipApiSmokeChecks:
        description: Skip API smoke checks (use only for urgent UI-only rollouts)
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      id-token: write
      contents: read
      issues: write
    uses: ./.github/workflows/deploy-azd.yml
    with:
      environment: dev
      location: ${{ github.event_name == 'workflow_dispatch' && inputs.location || 'centralus' }}
      projectName: ${{ github.event_name == 'workflow_dispatch' && inputs.projectName || 'holidaypeakhub405' }}
      imageTag: ${{ github.event_name == 'workflow_dispatch' && inputs.imageTag || github.event.workflow_run.head_sha }}
      sourceSha: ${{ github.event_name == 'workflow_dispatch' && inputs.testedSourceSha || (github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '') }}
      sourceRef: ${{ github.event_name == 'workflow_dispatch' && inputs.testedSourceRef || (github.event_name == 'workflow_run' && format('refs/heads/{0}', github.event.workflow_run.head_branch) || '') }}
      deployStatic: ${{ github.event_name != 'workflow_dispatch' || inputs.deployStatic }}
      uiOnly: ${{ github.event_name == 'workflow_dispatch' && inputs.uiOnly }}
      apiBaseUrl: ${{ github.event_name == 'workflow_dispatch' && inputs.apiBaseUrl || '' }}
      deployChangedOnly: true
      skipProvision: ${{ github.event_name != 'workflow_dispatch' || inputs.skipProvision }}
      serviceFilter: ${{ github.event_name == 'workflow_dispatch' && inputs.serviceFilter || '' }}
      forceApimSync: ${{ github.event_name == 'workflow_dispatch' && inputs.forceApimSync }}
      autoAllowAcrRunnerIp: ${{ github.event_name != 'workflow_dispatch' || inputs.autoAllowAcrRunnerIp }}
      skipApiSmokeChecks: ${{ github.event_name == 'workflow_dispatch' && inputs.skipApiSmokeChecks }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
