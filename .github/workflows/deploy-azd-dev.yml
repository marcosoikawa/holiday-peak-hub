name: deploy-azd-dev (entrypoint)

on:
  push:
    branches:
      - main
    paths:
      - azure.yaml
      - apps/**
      - lib/**
      - .infra/**
      - .github/workflows/deploy-azd.yml
      - .github/workflows/deploy-azd-dev.yml
  workflow_dispatch:
    inputs:
      location:
        description: Azure location
        required: true
        default: centralus
      projectName:
        description: Project prefix used by naming convention
        required: true
        default: holidaypeakhub405
      imageTag:
        description: Image tag to deploy
        required: true
        default: latest
      deployStatic:
        description: Provision static web app resources
        required: true
        type: boolean
        default: true
      uiOnly:
        description: Deploy only the UI using SWA token (skips provision and Azure login jobs)
        required: true
        type: boolean
        default: true
      apiBaseUrl:
        description: Optional API base URL for UI build override
        required: false
        default: ''
      forceApimSync:
        description: Force APIM sync and smoke checks even when no changed services are detected
        required: true
        type: boolean
        default: false
      autoAllowAcrRunnerIp:
        description: Temporarily allow GitHub runner egress IP in ACR firewall during deploy and remove it afterward
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-from-push:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/deploy-azd.yml
    with:
      environment: dev
      location: centralus
      projectName: holidaypeakhub405
      imageTag: ${{ github.sha }}
      deployStatic: true
      uiOnly: false
      apiBaseUrl: ''
      deployChangedOnly: true
      forceApimSync: false
      autoAllowAcrRunnerIp: true
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}

  deploy-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/deploy-azd.yml
    with:
      environment: dev
      location: ${{ inputs.location }}
      projectName: ${{ inputs.projectName }}
      imageTag: ${{ inputs.imageTag }}
      deployStatic: ${{ inputs.deployStatic }}
      uiOnly: ${{ inputs.uiOnly }}
      apiBaseUrl: ${{ inputs.apiBaseUrl }}
      deployChangedOnly: true
      forceApimSync: ${{ inputs.forceApimSync }}
      autoAllowAcrRunnerIp: ${{ inputs.autoAllowAcrRunnerIp }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
