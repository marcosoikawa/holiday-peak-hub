name: lint

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - lib/**
      - apps/**
      - docs/architecture/**
      - docs/governance/**
      - scripts/ops/**
      - .github/prompts/**
      - .github/agents/**
      - .github/skills/**
      - pyproject.toml
      - conftest.py
      - .github/workflows/test.yml
      - .github/workflows/lint.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Verify lockfiles are committed and current
        run: |
          test -f apps/ui/yarn.lock
          yarn --cwd apps/ui install --frozen-lockfile --check-files --non-interactive
          for d in apps/*/src; do
            [ -f "$d/pyproject.toml" ] || continue
            [ -f "$d/uv.lock" ] || { echo "Missing uv.lock in $d"; exit 1; }
            (cd "$d" && uv lock --check)
          done
      - name: Install lib
        run: uv pip install --system -e ./lib/src
      - name: Install lint dependencies
        run: uv pip install --system pylint isort mypy "black[jupyter]>=26.3.1"
      - name: Install apps
        run: |
          for d in apps/*/src; do
            [ -f "$d/pyproject.toml" ] && uv pip install --system -e "$d" || echo "Skipping $d"
          done
      - name: Lint
        run: |
          python -m isort --check-only lib apps
          python -m black --check lib apps
          python -m pylint --fail-on=E,F lib/src apps/*/src
      - name: Type check (mypy)
        run: |
          python -m mypy --config-file pyproject.toml --ignore-missing-imports --follow-imports=skip lib/src/holiday_peak_lib/agents/service_agent.py lib/src/holiday_peak_lib/agents/memory/builder.py
      - name: Check prompt and agent governance consistency
        run: |
          python scripts/ops/check_prompt_agent_consistency.py --report-file governance-drift-report.md
      - name: Validate governance and architecture docs links
        run: |
          set -o pipefail
          python scripts/ops/check_markdown_links.py --roots docs/governance docs/architecture | tee architecture-link-drift-report.txt
      - name: Block stale canonical governance references in agent docs
        run: |
          if grep -RInE "OPERATIONAL-WORKFLOWS\.md|REPOSITORY-SURFACES\.md|governance-map\.md" .github/agents; then
            echo "Found stale canonical governance references in .github/agents"
            exit 1
          fi
      - name: Upload governance drift reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-drift-reports
          path: |
            governance-drift-report.md
            architecture-link-drift-report.txt
          if-no-files-found: warn
