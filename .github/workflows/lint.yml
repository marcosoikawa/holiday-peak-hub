name: lint

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - lib/**
      - apps/**
      - pyproject.toml
      - conftest.py
      - .github/workflows/test.yml
      - .github/workflows/lint.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install lib
        run: uv pip install --system -e ./lib/src
      - name: Install lint dependencies
        run: uv pip install --system pylint isort "black[jupyter]>=26.3.1"
      - name: Install apps
        run: |
          for d in apps/*/src; do
            [ -f "$d/pyproject.toml" ] && uv pip install --system -e "$d" || echo "Skipping $d"
          done
      - name: Lint
        run: |
          python -m isort --check-only lib apps
          python -m black --check lib apps
          python -m pylint lib/src apps/*/src
      - name: Validate governance and architecture docs links
        run: |
          python scripts/ops/check_markdown_links.py --roots docs/governance docs/architecture/README.md
      - name: Block stale canonical governance references in agent docs
        run: |
          if grep -RInE "OPERATIONAL-WORKFLOWS\.md|REPOSITORY-SURFACES\.md|governance-map\.md" .github/agents; then
            echo "Found stale canonical governance references in .github/agents"
            exit 1
          fi
