name: ghcr-build-publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      imageTag:
        description: Image tag to publish to GHCR
        required: true
        default: latest
      pushImages:
        description: Push built images to GHCR (false = build validation only)
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: ${{ github.event_name == 'push' || inputs.pushImages }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build images (optional push)
        run: |
          registry=$(echo "$REGISTRY" | tr '[:upper:]' '[:lower:]')
          image_tag="${{ inputs.imageTag }}"
          push_images="${{ inputs.pushImages }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            image_tag="${{ github.ref_name }}"
            push_images="true"
          fi

          for d in apps/*; do
            [ -d "$d" ] || continue
            [ -f "$d/src/Dockerfile" ] || continue
            image_name=$(basename "$d")
            docker build -t "$registry/$image_name:$image_tag" -f "$d/src/Dockerfile" "$d/src"
            if [ "$push_images" = "true" ]; then
              docker push "$registry/$image_name:$image_tag"
            fi
          done
