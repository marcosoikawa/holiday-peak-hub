serviceName: "example-service"

# Workload identity — ServiceAccount and Azure identity binding
serviceAccount:
  create: true
  clientId: ""  # UAMI client ID set by render-helm.sh from Bicep outputs

# Service configuration
service:
  type: "ClusterIP"  # Changed from LoadBalancer - use Ingress for external access
  port: 80
  targetPort: 8000
  annotations: {}

# Legacy ingress configuration for explicit rollback-only publication.
ingress:
  enabled: false
  className: ""
  host: ""  # Leave empty for path-based routing, or set hostname for host-based
  path: ""  # Defaults to /{serviceName}
  paths: []  # Optional explicit ingress paths, e.g. [{ path: /health, pathType: Prefix }, { path: /api, pathType: Prefix }]
  pathType: "Prefix"
  requestTimeout: 30
  tls: []
  annotations: {}

# Application Gateway for Containers publication.
agc:
  enabled: false
  gatewayClassName: ""
  hostnames: []
  paths: []
  parentRefs: []
  sharedResources:
    create: false
    namespace: ""
    applicationLoadBalancerName: "holiday-peak-agc"
    gatewayName: "holiday-peak-agc"
    subnetId: ""
    listeners:
      - name: http
        protocol: HTTP
        port: 80
        hostname: ""

# Container image
image:
  repository: "ghcr.io/azure-samples/holiday-peak-hub/example"
  tag: "latest"
  digest: ""

replicaCount: 2

# Resource limits and requests
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

# Health probes
probes:
  startup:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5

# Node selector for targeting specific node pools
# For agents: agentpool: agents
# For crud: agentpool: crud
nodeSelector: {}

# Tolerations for node pool taints
# For agents: { key: "workload", operator: "Equal", value: "agents", effect: "NoSchedule" }
# For crud: { key: "workload", operator: "Equal", value: "crud", effect: "NoSchedule" }
tolerations: []

# Availability controls
availability:
  strategy:
    type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%
  topologySpreadConstraints:
    enabled: false
    constraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
  podAntiAffinity:
    enabled: false
    topologyKey: kubernetes.io/hostname

# PodDisruptionBudget
pdb:
  enabled: false
  minAvailable: null
  maxUnavailable: 1

# KEDA autoscaling configuration
keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30
  triggers:
    - type: azure-eventhub
      metadata:
        connection: EventHubConnection
        eventHubName: example-hub
        consumerGroup: $Default
        blobContainer: keda-checkpoints
        storageConnection: StorageConnection

# Canary deployment configuration
canary:
  enabled: false  # Disabled by default, enable for progressive rollouts
  replicaCount: 1
  image:
    repository: ""  # Uses main image.repository if empty
    tag: ""  # Uses main image.tag if empty
    digest: ""  # Uses main image.digest if empty
  ingress:
    enabled: false
    annotations: {}
  headerRouting:
    enabled: false
    headerName: "x-canary"
    headerValue: "true"

# Deployment compatibility options
deployment:
  selectorIncludeCanary: false

container:
  command: []
  args: []
