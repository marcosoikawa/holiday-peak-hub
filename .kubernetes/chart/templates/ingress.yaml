{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}
  labels:
    app: {{ .Values.serviceName }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ .Values.ingress.path | default (printf "/%s" .Values.serviceName) }}
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "holiday-peak-service.fullname" . }}
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- end }}

---
{{- if and .Values.canary.enabled .Values.canary.ingress.enabled }}
# Canary Ingress for progressive deployment
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}-canary
  labels:
    app: {{ .Values.serviceName }}
    canary: "true"
  {{- with .Values.canary.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ .Values.ingress.path | default (printf "/%s" .Values.serviceName) }}/canary
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "holiday-peak-service.fullname" . }}-canary
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- end }}
