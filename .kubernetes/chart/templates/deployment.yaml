apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}
  labels:
    app: {{ .Values.serviceName }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.availability.strategy }}
  strategy:
    type: {{ .Values.availability.strategy.type | default "RollingUpdate" }}
    {{- if and (eq (.Values.availability.strategy.type | default "RollingUpdate") "RollingUpdate") .Values.availability.rollingUpdate }}
    rollingUpdate:
      maxUnavailable: {{ .Values.availability.rollingUpdate.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.availability.rollingUpdate.maxSurge | default "25%" }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
      {{- if .Values.deployment.selectorIncludeCanary }}
      canary: "false"
      {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
        canary: "false"
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.availability.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- range .Values.availability.topologySpreadConstraints.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | default "topology.kubernetes.io/zone" | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "ScheduleAnyway" | quote }}
          labelSelector:
            matchLabels:
              app: {{ $.Values.serviceName }}
        {{- end }}
      {{- end }}
      {{- if .Values.availability.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Values.serviceName }}
              topologyKey: {{ .Values.availability.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" | quote }}
      {{- end }}
      containers:
        - name: {{ .Values.serviceName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- if .Values.container.command }}
          command:
            {{- toYaml .Values.container.command | nindent 12 }}
          {{- end }}
          {{- if .Values.container.args }}
          args:
            {{- toYaml .Values.container.args | nindent 12 }}
          {{- end }}
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - containerPort: 8000
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/health" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/ready" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
{{- if .Values.canary.enabled }}
# Canary deployment for progressive rollout
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}-canary
  labels:
    app: {{ .Values.serviceName }}
    canary: "true"
spec:
  replicas: {{ .Values.canary.replicaCount | default 1 }}
  {{- if .Values.availability.strategy }}
  strategy:
    type: {{ .Values.availability.strategy.type | default "RollingUpdate" }}
    {{- if and (eq (.Values.availability.strategy.type | default "RollingUpdate") "RollingUpdate") .Values.availability.rollingUpdate }}
    rollingUpdate:
      maxUnavailable: {{ .Values.availability.rollingUpdate.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.availability.rollingUpdate.maxSurge | default "25%" }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
      canary: "true"
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
        canary: "true"
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.availability.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- range .Values.availability.topologySpreadConstraints.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | default "topology.kubernetes.io/zone" | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "ScheduleAnyway" | quote }}
          labelSelector:
            matchLabels:
              app: {{ $.Values.serviceName }}
              canary: "true"
        {{- end }}
      {{- end }}
      {{- if .Values.availability.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Values.serviceName }}
                  canary: "true"
              topologyKey: {{ .Values.availability.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" | quote }}
      {{- end }}
      containers:
        - name: {{ .Values.serviceName }}
          image: "{{ .Values.canary.image.repository | default .Values.image.repository }}:{{ .Values.canary.image.tag | default .Values.image.tag }}"
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - containerPort: 8000
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/health" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/ready" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
